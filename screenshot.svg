  <rect x="750" y="236" width="12" height="6" rx="1.5" fill="#f59e0b"/>
  <text x="782" y="254" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="16" font-weight="500" fill="#374151">Dev Tools</text>

  <!-- News folder -->
  <rect x="750" y="280" width="20" height="16" rx="2" fill="#fbbf24"/>
  <rect x="750" y="276" width="12" height="6" rx="1.5" fill="#f59e0b"/>
  <text x="782" y="294" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="16" font-weight="500" fill="#374151">News</text>

