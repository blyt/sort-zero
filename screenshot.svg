  <rect x="750" y="404" width="20" height="20" rx="3" fill="#dbeafe"/>
  <text x="782" y="420" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="16" font-weight="400" fill="#374151">Booking.com</text>

  <!-- GitHub -->
  <rect x="750" y="446" width="20" height="20" rx="3" fill="#dbeafe"/>
  <text x="782" y="462" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="16" font-weight="400" fill="#374151">GitHub</text>

  <!-- Zillow -->
  <rect x="750" y="488" width="20" height="20" rx="3" fill="#dbeafe"/>
  <text x="782" y="504" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="16" font-weight="400" fill="#374151">Zillow</text>

