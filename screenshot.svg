  <rect x="750" y="316" width="12" height="6" rx="1.5" fill="#f59e0b"/>
  <text x="782" y="334" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="16" font-weight="500" fill="#374151">Work</text>

