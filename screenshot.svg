<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="1280" height="800" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="640" y="80" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="42" font-weight="700" fill="#1a1a1a" text-anchor="middle">Sort Zero</text>
  <text x="640" y="120" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="20" font-weight="400" fill="#6b7280" text-anchor="middle">Keeps your bookmarks sorted. Always.</text>

  <!-- Before Panel -->
  <rect x="80" y="170" width="480" height="520" rx="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <!-- Before header -->
  <rect x="80" y="170" width="480" height="48" rx="12" fill="#ffffff"/>
  <rect x="80" y="206" width="480" height="12" fill="#ffffff"/>
  <line x1="80" y1="218" x2="560" y2="218" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="320" y="200" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="16" font-weight="600" fill="#9ca3af" text-anchor="middle" letter-spacing="1.5">BEFORE</text>

  <!-- Before items -->
  <!-- Zillow -->
  <rect x="110" y="240" width="20" height="20" rx="3" fill="#dbeafe"/>
  <text x="142" y="256" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="16" font-weight="400" fill="#374151">Zillow</text>

  <!-- Work folder -->
  <rect x="110" y="284" width="20" height="16" rx="2" fill="#fbbf24"/>
  <rect x="110" y="280" width="12" height="6" rx="1.5" fill="#f59e0b"/>
  <text x="142" y="298" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="16" font-weight="500" fill="#374151">Work</text>

  <!-- Amazon -->
  <rect x="110" y="322" width="20" height="20" rx="3" fill="#dbeafe"/>
  <text x="142" y="338" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="16" font-weight="400" fill="#374151">Amazon</text>

  <!-- News folder -->
  <rect x="110" y="366" width="20" height="16" rx="2" fill="#fbbf24"/>
  <rect x="110" y="362" width="12" height="6" rx="1.5" fill="#f59e0b"/>
  <text x="142" y="380" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="16" font-weight="500" fill="#374151">News</text>

  <!-- GitHub -->
  <rect x="110" y="408" width="20" height="20" rx="3" fill="#dbeafe"/>
  <text x="142" y="424" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="16" font-weight="400" fill="#374151">GitHub</text>

